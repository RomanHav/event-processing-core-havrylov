name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest flake8 bandit

      - name: Lint (flake8)
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__

      - name: Security scan (bandit)
        run: bandit -r core/ input/ validation/ -ll

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest tests/ -v